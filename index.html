<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتخب مصر</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-image: url('1783784773553.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* حركة الهبوط (أبطأ لتتمكن من رؤية النبض أثناء النزول) */
    @keyframes slideDown {
      0% { transform: translateY(-300px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* حركة نبض التوهج (أسرع قليلاً لتظهر التغييرات أثناء النزول) */
    @keyframes pulse-red-steady {
      0%, 100% { filter: drop-shadow(0 0 5px red); }
      50% { filter: drop-shadow(0 0 30px red) drop-shadow(0 0 40px red); }
    }

    .header-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
      
      /* دمج الحركتين: هبوط بطيء مع نبض مستمر من اللحظة الأولى */
      animation: slideDown 3s ease-out forwards, pulse-red-steady 1.5s linear infinite;
    }

    h1 {
      color: #ffffff;
      margin: 0;
      font-size: 3rem;
    }

    .flag {
      font-size: 2rem;
      margin-top: 10px;
    }

    video {
      width: 100%; 
      max-width: 1000px; 
      border: 5px solid red;
      border-radius: 10px;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <div class="header-container">
    <h1>Egypt</h1>
    <div class="flag">🇪🇬</div>
  </div>

  <video controls>
    <source src="snaptik_7658456278041218322_v3.mp4" type="video/mp4">
    المتصفح الخاص بك لا يدعم تشغيل ملفات الفيديو.
  </video>

</body>
</html>
