<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتخب مصر</title>
  <style>
    /* جعل ارتفاع صفحة الويب يغطي الشاشة بالكامل */
    html, body {
      height: 100%;
      margin: 0;
    }

    /* استخدام Flexbox لتوسيط المحتوى عموديًا وأفقيًا */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background-color: #f9f9f9;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
    }

    /* تخصيص شكل الفيديو */
    video {
      width: 80%; /* زيادة حجم الفيديو */
      max-width: 800px; /* ضمان عدم تجاوز العرض لحد معين */
      border: 5px solid red; /* الإطار الأحمر */
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>شركاء منتخب مصر</h1>

  <video controls>
    <source src="snaptik_7658456278041218322_v3.mp4" type="video/mp4">
    المتصفح الخاص بك لا يدعم تشغيل ملفات الفيديو.
  </video>

</body>
</html>
