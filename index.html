<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background-color: #333;
    }

    /* حركة الهبوط فقط */
    @keyframes slideDown {
      0% { transform: translateY(-300px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* حركة نبض التوهج فقط */
    @keyframes pulse-red-steady {
      0%, 100% { filter: drop-shadow(0 0 5px red); }
      50% { filter: drop-shadow(0 0 20px red) drop-shadow(0 0 30px red); }
    }

    .header-container {
      /* هنا الهبوط فقط */
      animation: slideDown 3s ease-out forwards;
    }

    .pulse-wrapper {
      /* هنا التوهج فقط - سيعمل من لحظة ظهور العنصر */
      animation: pulse-red-steady 1.5s linear infinite;
      display: inline-block;
      padding: 20px;
    }

    h1 { color: #ffffff; margin: 0; font-size: 3rem; }
    .flag { font-size: 2rem; }
    video { width: 100%; max-width: 800px; border: 5px solid red; margin-top: 50px; }
  </style>
</head>
<body>

  <div class="header-container">
    <div class="pulse-wrapper">
      <h1>Egypt</h1>
      <div class="flag">🇪🇬</div>
    </div>
  </div>

  <video controls>
    <source src="snaptik_7658456278041218322_v3.mp4" type="video/mp4">
  </video>

</body>
</html>
