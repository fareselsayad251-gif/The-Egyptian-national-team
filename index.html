<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتخب مصر</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-image: url('1783784773553.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* حركة نبض ثابتة باللون الأحمر */
    @keyframes pulse-red-steady {
      0% { filter: drop-shadow(0 0 5px red); }
      50% { filter: drop-shadow(0 0 25px red) drop-shadow(0 0 35px red); }
      100% { filter: drop-shadow(0 0 5px red); }
    }

    /* تنسيق الحاوية التي تضم النص والعلم */
    .header-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
      /* تطبيق النبض على الحاوية كاملة ليظهر على النص والعلم معاً */
      animation: pulse-red-steady 3s linear infinite;
    }

    h1 {
      color: #ffffff;
      margin: 0;
      font-size: 3rem;
    }

    .flag {
      font-size: 3rem;
      margin-top: 10px;
    }

    video {
      width: 100%; 
      max-width: 1000px; 
      border: 5px solid red;
      border-radius: 10px;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <div class="header-container">
    <h1>Egypt</h1>
    <div class="flag">🇪🇬</div>
  </div>

  <video controls>
    <source src="snaptik_7658456278041218322_v3.mp4" type="video/mp4">
    المتصفح الخاص بك لا يدعم تشغيل ملفات الفيديو.
  </video>

</body>
</html>
