<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتخب مصر</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-image: url('1783784773553.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* تعريف حركة النبض البطيئة للنص فقط */
    @keyframes pulse-white {
      0%, 100% { text-shadow: 0 0 5px white; }
      50% { text-shadow: 0 0 20px white, 0 0 40px white; }
    }

    h1 {
      color: #ffffff;
      margin-bottom: 20px;
      /* تطبيق نبض أبطأ (2s بدلاً من 0.8s) */
      animation: pulse-white 2s infinite alternate;
    }

    video {
      width: 100%; 
      max-width: 1000px; 
      border: 5px solid red;
      border-radius: 10px;
      margin-top: 100px;
      /* إزالة الأنيميشن من هنا ليبقى الإطار ثابتاً */
    }
  </style>
</head>
<body>

  <h1>Egypt 🇪🇬</h1>

  <video controls>
    <source src="snaptik_7658456278041218322_v3.mp4" type="video/mp4">
    المتصفح الخاص بك لا يدعم تشغيل ملفات الفيديو.
  </video>

</body>
</html>
