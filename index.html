<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتخب مصر</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-image: url('1783784773553.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      color: #ffffff;
      margin-bottom: 20px;
      /* إضافة توهج للنص باللون الأبيض مع إزاحة خفيفة */
      text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #e60073, 0 0 40px #e60073;
      transition: 0.3s;
    }

    video {
      width: 100%; 
      max-width: 1000px; 
      border: 5px solid red;
      border-radius: 10px;
      margin-top: 100px;
      background-color: rgba(255, 255, 255, 0.8);
      
      /* إضافة توهج أحمر مستمر حول الإطار */
      box-shadow: 0 0 15px red, 0 0 30px red;
      
      /* إضافة حركة نبض خفيفة للتوهج لجعله أكثر حيوية */
      animation: glow-pulse 1.5s infinite alternate;
    }

    /* تعريف حركة النبض للتوهج */
    @keyframes glow-pulse {
      from { box-shadow: 0 0 10px red, 0 0 20px red; }
      to { box-shadow: 0 0 20px red, 0 0 40px red, 0 0 60px red; }
    }
  </style>
</head>
<body>

  <h1>Egypt 🇪🇬</h1>

  <video controls>
    <source src="snaptik_7658456278041218322_v3.mp4" type="video/mp4">
    المتصفح الخاص بك لا يدعم تشغيل ملفات الفيديو.
  </video>

</body>
</html>
