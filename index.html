<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-image: url('1783784773553.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      color: #ffffff;
      font-size: 3rem;
      /* توهج أبيض شفاف للنص */
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3);
      margin-bottom: 20px;
    }

    /* توهج خاص لعلم مصر (نستخدم span للفصله عن النص) */
    .flag-glow {
      text-shadow: 0 0 15px rgba(255, 0, 0, 0.4), 0 0 25px rgba(255, 255, 255, 0.4), 0 0 35px rgba(0, 0, 0, 0.4);
    }

    video {
      width: 100%; 
      max-width: 1000px; 
      border: 5px solid red;
      border-radius: 10px;
      margin-top: 50px;
      background-color: rgba(255, 255, 255, 0.8);
      
      /* توهج أحمر شفاف للإطار */
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
      
      /* حركة نبض أهدأ */
      animation: glow-pulse 2s infinite alternate;
    }

    @keyframes glow-pulse {
      from { box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }
      to { box-shadow: 0 0 30px rgba(255, 0, 0, 0.4); }
    }
  </style>
</head>
<body>

  <h1>Egypt <span class="flag-glow">🇪🇬</span></h1>

  <video controls>
    <source src="snaptik_7658456278041218322_v3.mp4" type="video/mp4">
  </video>

</body>
</html>
