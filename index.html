<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتخب مصر</title>
  <style>
    :root {
      /* قم بتغيير اسم الصورة هنا فقط */
      --bg-image: url('1783784773553.jpg');
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      /* استخدام المتغير هنا */
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* حركة النبض (الهالة) */
    @keyframes pulse-red-steady {
      0% { filter: drop-shadow(0 0 5px red); }
      50% { filter: drop-shadow(0 0 25px red) drop-shadow(0 0 35px red); }
      100% { filter: drop-shadow(0 0 5px red); }
    }

    /* حركة النزول من الأعلى */
    @keyframes slideDown {
      from { transform: translateY(-200px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .header-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
      /* دمج الحركتين */
      animation: slideDown 2s ease-out forwards, pulse-red-steady 3s linear infinite;
    }

    h1 {
      color: #ffffff;
      margin: 0;
      font-size: 3rem;
    }

    .flag {
      font-size: 2rem;
      margin-top: 10px;
    }

    video {
      width: 100%; 
      max-width: 1000px; 
      border: 5px solid red;
      border-radius: 10px;
      margin-top: 5px;
    }

    /* --- التنسيقات الجديدة الخاصة بالصور --- */

    /* حاوية مخصصة لضمان تمركز العناصر ومحاذاة حاوية الصور لليسار */
    .content-wrapper {
      width: 100%;
      max-width: 1000px; /* نفس الحد الأقصى لعرض الفيديو */
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start; /* محاذاة المحتوى داخلها لليسار */
    }

    .images-container {
      display: flex;
      flex-direction: column; /* ترتيب رأسي (تحت بعض) */
      gap: 20px; /* مسافة بين كل صورة والتانية */
    }

    .styled-image {
      width: 300px; /* حجم الصورة (يمكنك تعديله حسب رغبتك) */
      height: 300px; /* جعل الارتفاع مساوٍ للعرض لضمان شكل مربع */
      object-fit: cover; /* لضمان عدم تمدد أو تشوه الصورة داخل المربع */
      border: 5px solid red; /* نفس سمك ولون فريم الفيديو */
      border-radius: 10px; /* نفس انحناء الفيديو */
    }
  </style>
</head>
<body>

  <div class="header-container">
    <h1>Egypt</h1>
    <div class="flag">🇪🇬</div>
  </div>

  <video controls>
    <source src="snaptik_7658456278041218322_v3.mp4" type="video/mp4">
    المتصفح الخاص بك لا يدعم تشغيل ملفات الفيديو.
  </video>

  <div class="content-wrapper">
    <div class="images-container">
      <img src="image1.jpg" alt="الصورة الأولى" class="styled-image">
      <img src="image2.jpg" alt="الصورة الثانية" class="styled-image">
      <img src="image3.jpg" alt="الصورة الثالثة" class="styled-image">
      <img src="image4.jpg" alt="الصورة الرابعة" class="styled-image">
      <img src="image5.jpg" alt="الصورة الخامسة" class="styled-image">
    </div>
  </div>

</body>
</html>
