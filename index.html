<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتخب مصر</title>
  <style>
    /* تنسيق الصفحة العامة */
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      
      /* إضافة صورة الخلفية */
      background-image: url('your-image.jpg'); /* ضع هنا اسم ملف صورتك */
      background-size: cover;          /* جعل الصورة تغطي كامل الشاشة */
      background-position: center;     /* توسيط الصورة */
      background-attachment: fixed;    /* ثبات الخلفية عند التمرير */
      
      /* استخدام flex لترتيب العناصر عمودياً */
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      color: #ffffff; /* جعل اللون أبيض ليكون واضحاً فوق الخلفية */
      text-shadow: 2px 2px 4px #000; /* إضافة ظل للنص لزيادة الوضوح */
      margin-bottom: 20px;
    }

    /* تخصيص شكل الفيديو */
    video {
      width: 90%; 
      max-width: 900px; 
      border: 5px solid red;
      border-radius: 10px;
      margin-top: 20px;
      background-color: rgba(255, 255, 255, 0.8); /* إضافة خلفية شفافة للفيديو ليتناسق مع الصورة */
    }
  </style>
</head>
<body>

  <h1>شركاء منتخب مصر</h1>

  <video controls>
    <source src="snaptik_7658456278041218322_v3.mp4" type="video/mp4">
    المتصفح الخاص بك لا يدعم تشغيل ملفات الفيديو.
  </video>

</body>
</html>
