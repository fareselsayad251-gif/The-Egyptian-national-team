<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتخب مصر</title>
  <style>
    /* تنسيق الصفحة العامة */
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
      /* استخدام flex لترتيب العناصر عمودياً */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #333;
      margin-bottom: 20px; /* مسافة بين العنوان والفيديو */
    }

    /* تخصيص شكل الفيديو */
    video {
      /* تكبير حجم الفيديو */
      width: 90%; 
      max-width: 900px; 
      
      /* إضافة الإطار الأحمر */
      border: 5px solid red;
      border-radius: 10px;
      
      /* إزاحة الفيديو للأعلى قليلاً */
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>شركاء منتخب مصر</h1>

  <video controls>
    <source src="snaptik_7658456278041218322_v3.mp4" type="video/mp4">
    المتصفح الخاص بك لا يدعم تشغيل ملفات الفيديو.
  </video>

</body>
</html>
